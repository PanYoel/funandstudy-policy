<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Fun And Study - RougeMin</title>

<style>
    :root {
        --bg-color: #0f172a;
        --panel-color: #1e2538;
        --accent: #4f46e5;
        --text-main: #ffffff;
        --text-dim: rgba(255,255,255,0.65);
        --radius: 16px;
        --radius-lg: 20px;
        --border-color: rgba(255,255,255,0.07);
        --shadow-card: 0 24px 48px rgba(0,0,0,0.7);
        --shadow-button: 0 14px 28px rgba(0,0,0,0.6);
    }

    * {
        box-sizing: border-box;
        -webkit-font-smoothing: antialiased;
    }

    body {
        margin: 0;
        background:
            radial-gradient(
                circle at 20% 20%,
                #1e2538 0%,
                #0f172a 60%
            );
        background-color: var(--bg-color);
        color: var(--text-main);
        font-family:
            system-ui,
            -apple-system,
            BlinkMacSystemFont,
            "Inter",
            Roboto,
            "Noto Sans",
            "Segoe UI",
            sans-serif;
        line-height: 1.5;
        display: flex;
        justify-content: center;
        padding: 40px 16px 80px;
    }

    .page-wrap {
        width: 100%;
        max-width: 480px;
        display: flex;
        flex-direction: column;
        gap: 24px;
        position: relative;
    }

    /* 브랜드, 제목, 아이콘 영역 */
    .brand-block {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 16px;
    }

    .brand-name {
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--text-main);
        text-shadow: 0 8px 24px rgba(0,0,0,0.8);
    }

    .game-identity {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-card);
        padding: 16px 20px;
        max-width: 480px;
        width: 100%;
    }

    .game-icon {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        border: 1px solid var(--border-color);
        box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        background-color: #000;
        object-fit: cover;
    }

    .game-title {
        font-size: 1.125rem;
        font-weight: 600;
        color: var(--text-main);
        line-height: 1.4;
        text-align: center;
    }

    /* 언어 선택 패널 */
    .lang-panel {
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-card);
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .lang-title {
        font-size: 0.95rem;
        font-weight: 500;
        color: var(--text-dim);
        text-align: center;
        letter-spacing: -0.02em;
    }

    .lang-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
    }

    @media (max-width: 380px) {
        .lang-grid {
            grid-template-columns: 1fr;
        }
    }

    .lang-btn {
        appearance: none;
        border-radius: var(--radius);
        background:
            linear-gradient(
                145deg,
                rgba(79,70,229,0.18) 0%,
                rgba(79,70,229,0) 60%
            );
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: var(--shadow-button);
        color: var(--text-main);
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 500;
        line-height: 1.4;
        padding: 12px 14px;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .lang-btn:active {
        transform: scale(0.98);
    }

    .footer-note {
        font-size: 0.7rem;
        color: var(--text-dim);
        text-align: center;
        line-height: 1.4;
        margin-top: 8px;
    }

    .footer-note a {
        color: var(--text-dim);
        text-decoration: underline;
    }
</style>
</head>

<body>

<div class="page-wrap">

    <!-- 브랜드 / 게임 제목 / 아이콘 -->
    <header class="brand-block">

        <div class="brand-name">
            Fun And Study
        </div>

        <div class="game-identity">

            <!--
                기존 이미지 파일 이름은 그대로 유지했습니다.

                실제 이미지 파일 이름도 변경했다면 아래 경로를
                images/RougeMin - English Icon.png
                형식으로 변경하면 됩니다.
            -->
            <img
                class="game-icon"
                src="images/RougeMin - English Icon.png"
                alt="RougeMin Icon"
            />

            <div class="game-title">
                RougeMin: Roguelike Learning English Game
            </div>

        </div>

    </header>

    <!-- 언어 선택 -->
    <section class="lang-panel">

        <div class="lang-title">
            Choose your language / 사용 언어를 선택하세요
        </div>

        <div class="lang-grid">

            <!-- 한국어 -->
            <a
                class="lang-btn"
                href="home/home-korean.html"
                lang="ko"
            >
                한국어
            </a>

            <!-- 일본어 -->
            <a
                class="lang-btn"
                href="home/home-japanese.html"
                lang="ja"
            >
                日本語
            </a>

            <!-- 중국어 간체 -->
            <a
                class="lang-btn"
                href="home/home-chinese-simplified.html"
                lang="zh-CN"
            >
                简体中文
            </a>

            <!-- 중국어 번체 -->
            <a
                class="lang-btn"
                href="home/home-chinese-traditional.html"
                lang="zh-TW"
            >
                繁體中文
            </a>

            <!-- 스페인어 -->
            <a
                class="lang-btn"
                href="home/home-spanish.html"
                lang="es"
            >
                Español
            </a>

            <!-- 포르투갈어 -->
            <a
                class="lang-btn"
                href="home/home-portuguese.html"
                lang="pt"
            >
                Português
            </a>

            <!-- 베트남어 -->
            <a
                class="lang-btn"
                href="home/home-vietnamese.html"
                lang="vi"
            >
                Tiếng Việt
            </a>

            <!-- 태국어 -->
            <a
                class="lang-btn"
                href="home/home-thai.html"
                lang="th"
            >
                ไทย
            </a>

            <!-- 러시아어 -->
            <a
                class="lang-btn"
                href="home/home-russian.html"
                lang="ru"
            >
                Русский
            </a>

            <!-- 프랑스어 -->
            <a
                class="lang-btn"
                href="home/home-french.html"
                lang="fr"
            >
                Français
            </a>

            <!-- 독일어 -->
            <a
                class="lang-btn"
                href="home/home-german.html"
                lang="de"
            >
                Deutsch
            </a>

            <!-- 인도네시아어 -->
            <a
                class="lang-btn"
                href="home/home-indonesian.html"
                lang="id"
            >
                Bahasa Indonesia
            </a>

            <!-- 이탈리아어 -->
            <a
                class="lang-btn"
                href="home/home-italian.html"
                lang="it"
            >
                Italiano
            </a>

        </div>

        <div class="footer-note">
            Developer:
            <a href="mailto:meteor666a@gmail.com">
                meteor666a@gmail.com
            </a>
            <br />
            © 2025 Fun And Study. All rights reserved.
        </div>

    </section>

</div>

</body>
</html>
